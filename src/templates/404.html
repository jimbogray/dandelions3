<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #d0e8f2;
      font-family: sans-serif;
      color: #1a4a6e;
    }

    h1 {
      font-size: 5rem;
      margin: 0;
    }

    p {
      font-size: 1.2rem;
      margin: 12px 0 28px;
    }

    a {
      padding: 10px 28px;
      background: #2a6a9a;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: background 0.15s;
    }

    a:hover {
      background: #1a4a7a;
    }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>Oops — the wind blew this page away.</p>
  <a href="/">Back to the game</a>
</body>
</html>
